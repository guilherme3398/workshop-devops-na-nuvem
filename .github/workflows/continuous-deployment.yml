name: CI/CD
on:
  workflow_dispatch:
  push:
    branches:
    - main

env:
  ECR_REPOSITORY: dnn-conversao-distancia
  IMAGE_TAG: ${{ github.sha }}

permissions:
  id-token: write
  contents: read

jobs:
  CI:
    name: Continuous Integration
    runs-on: ubuntu-latest
    

    steps:
    - uses: actions/checkout@v6
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6.1.0
      with:
        aws-region: ${{ vars.AWS_REGION }}
        role-to-assume: ${{ vars.AWS_GITHUB_IAM }}
     
    
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push docker image to Amazon ECR
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        
      run: |
        docker build -f ./src/Dockerfile -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./src
        docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - uses: actions/checkout@v6
      with:
        repository: 'guilherme3398/workshop-devops-na-nuvem-gitops'
        token: ${{ secrets.PAT }}
        path: gitops-repo

    - name: Commit
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
          sed -i "s|image:.*|image: $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" k8s/ingress-deployment.yml
          cd gitops-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "[BOT] Changing image to $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          git push    